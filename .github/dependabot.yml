version: 2
updates:
  # Keep version updates disabled so this config only groups security updates.
  - package-ecosystem: "bundler"
    directory: "/docs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      docs-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

