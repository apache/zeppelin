<div class="sidebar" [class.simple]="note.config.looknfeel !== 'default'">
  <div class="sidebar-nav">
    <button
      [class.sidebar-button-active]="sidebarState === SidebarState.TOC"
      class="sidebar-button"
      aria-label="Toggle Table of Contents"
      (click)="setOrToggleSidebarState(SidebarState.TOC)"
    >
      <i nz-icon nzType="unordered-list" nzTheme="outline"></i>
    </button>
    <button
      [class.sidebar-button-active]="sidebarState === SidebarState.FILE_TREE"
      class="sidebar-button"
      aria-label="Toggle File Tree"
      (click)="setOrToggleSidebarState(SidebarState.FILE_TREE)"
    >
      <i nz-icon nzType="folder" nzTheme="outline"></i>
    </button>
  </div>
  <button
    class="sidebar-button sidebar-close"
    aria-label="Close Sidebar"
    (click)="setOrToggleSidebarState(SidebarState.CLOSED)"
  >
    @if (sidebarState !== SidebarState.CLOSED) {
      <i nz-icon nzType="close" nzTheme="outline"></i>
    }
  </button>
  @if (sidebarState !== SidebarState.CLOSED) {
    <div class="sidebar-main">
      @if (sidebarState === SidebarState.FILE_TREE) {
        <zeppelin-node-list></zeppelin-node-list>
      }
      @if (sidebarState === SidebarState.TOC) {
        <zeppelin-note-toc [note]="note" (scrollToParagraph)="onScrollToParagraph($event)"></zeppelin-note-toc>
      }
    </div>
  }
  <div></div>
</div>
