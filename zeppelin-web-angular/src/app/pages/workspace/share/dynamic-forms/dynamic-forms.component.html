<div nz-row [nzGutter]="24">
  @for (form of forms; track trackByNameFn($index, form)) {
    <div class="form-item" nz-col nzSpan="12" nzXl="8" nzLg="8" nzMd="12" nzSm="24">
      <div nz-row>
        @if (form.displayName) {
          <label class="item-label" nz-col nzSpan="6">{{ form.displayName }}:</label>
        }
        <div class="control-wrap" nz-col [nzSpan]="form.displayName ? 16 : 24">
          @switch (form.type) {
            @case (formType.TextBox) {
              <input
                nz-input
                [(ngModel)]="paramDefs[form.name]"
                [disabled]="disable"
                (ngModelChange)="onFormChange()"
              />
            }
            @case (formType.Password) {
              <input
                nz-input
                type="password"
                [(ngModel)]="paramDefs[form.name]"
                [disabled]="disable"
                (ngModelChange)="onFormChange()"
              />
            }
            @case (formType.Select) {
              <nz-select [nzDisabled]="disable" [(ngModel)]="paramDefs[form.name]" (ngModelChange)="onFormChange()">
                @for (opt of form.options; track opt) {
                  <nz-option [nzLabel]="opt.displayName || opt.value" [nzValue]="opt.value"></nz-option>
                }
              </nz-select>
            }
            @case (formType.CheckBox) {
              <nz-checkbox-group
                [nzDisabled]="disable"
                [nzOptions]="checkboxGroups[form.name]"
                [ngModel]="checkboxValues[form.name]"
                (ngModelChange)="checkboxChange($event, form.name)"
              ></nz-checkbox-group>
            }
          }
          @if (removable) {
            <button nz-button nzType="link" class="remove-button" (click)="remove(form)">
              <i nz-icon nzType="close" nzTheme="outline"></i>
            </button>
          }
        </div>
      </div>
    </div>
  }
</div>
