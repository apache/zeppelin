name: python_3_with_R
channels:
  - conda-forge
  - defaults
dependencies:
  - python >=3.9,<3.10
  - pyspark=3.5
  - pycodestyle
  # --- Core data libraries ---
  - pandas
  - numpy
  - scipy
  - pyarrow
  # --- Spark Connect protocol ---
  - grpcio
  - protobuf
  # --- HTTP / networking ---
  - requests
  - urllib3
  # --- File format support ---
  - openpyxl
  - xlrd
  - pyyaml
  - tabulate
  # --- GCP access ---
  - google-cloud-storage
  - google-auth
  - gcsfs
  # --- Visualization ---
  - matplotlib
  - seaborn
  - plotly
  - plotnine
  - altair
  - vega_datasets
  - hvplot
  # --- SQL on pandas ---
  - pandasql
  # --- ML ---
  - scikit-learn
  - xgboost
  # --- IPython / kernel ---
  - ipython
  - ipykernel
  - jupyter_client
  # --- Data connectors ---
  - intake
  - intake-parquet
  - intake-xarray
  # --- pip-only packages ---
  - pip
  - pip:
    - bkzep==0.6.1
    - delta-spark==3.2.1
  # --- R support ---
  - r-base=3
  - r-data.table
  - r-evaluate
  - r-base64enc
  - r-knitr
  - r-ggplot2
  - r-irkernel
  - r-shiny
  - r-googlevis
